<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BloxStore BR - Loja Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding-bottom: 80px;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #22c55e;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .auth-area {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .auth-area button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            width: auto;
            margin: 0;
        }

        .auth-area button:last-child {
            background: #22c55e;
        }

        .user-info-header {
            background: #1e293b;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .logout-btn-header {
            background: #ef4444;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #020617;
            padding: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: 0.3s;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            background: #1e293b;
        }

        .menu a:hover {
            background: #22c55e;
        }

        .container {
            padding: 15px;
            max-width: 100%;
        }

        .card {
            background: #1e293b;
            padding: 18px;
            margin: 12px 0;
            border-radius: 16px;
            border: 1px solid #334155;
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 20px;
            font-weight: bold;
            color: #22c55e;
        }

        .quantidade-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 14px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-warning {
            background: #f59e0b;
        }

        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            padding: 14px;
            border-radius: 50%;
            text-decoration: none;
            color: white;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 999;
        }

        .modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 15px;
        }

        .ticket-item, .product-item {
            background: #0f172a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border-left: 4px solid #22c55e;
        }

        .entregue {
            border-left-color: #ef4444;
            opacity: 0.7;
        }

        .respondido {
            border-left-color: #f59e0b;
        }

        .resposta-dono {
            background: #334155;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .finalizar-btn, .edit-btn, .delete-btn, .responder-btn {
            width: auto;
            padding: 8px 16px;
            margin-top: 8px;
            margin-right: 8px;
            display: inline-block;
        }

        .responder-btn {
            background: #f59e0b;
        }

        .edit-btn {
            background: #f59e0b;
        }

        .delete-btn {
            background: #ef4444;
        }

        .painel-dono {
            background: #334155;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .painel-dono button {
            margin-top: 8px;
        }

        hr {
            margin: 15px 0;
            border-color: #334155;
        }

        .add-product-btn {
            background: #22c55e;
            margin-bottom: 15px;
            width: 100%;
            padding: 12px;
        }

        .voltar-btn {
            background: #3b82f6;
            margin-bottom: 15px;
        }

        @media (max-width: 480px) {
            .card h3 {
                font-size: 16px;
            }
            
            button {
                padding: 12px;
                font-size: 14px;
            }
            
            .menu a {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🔥 BloxStore BR</div>
    <div id="authArea" class="auth-area"></div>
</header>

<div class="menu">
    <a onclick="mostrarProdutos()">🏪 Produtos</a>
    <a onclick="mostrarMeusTickets()">🎫 Meus Tickets</a>
</div>

<div class="container" id="mainContainer"></div>

<a class="whatsapp" href="https://wa.me/5513992012731" target="_blank">💬</a>

<script src="https://sdk.mercadopago.com/js/v2"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ========= CONFIGURAÇÕES DO FIREBASE =========
    const firebaseConfig = {
        apiKey: "AIzaSyAfJZVeKznju7J-KYTE-oSz6pRfbF6mBdQ",
        authDomain: "funzer.firebaseapp.com",
        projectId: "funzer",
        storageBucket: "funzer.firebasestorage.app",
        messagingSenderId: "723068647417",
        appId: "1:723068647417:web:7ae58205191b0099a1ef28"
    };

    // ========= CONFIGURAÇÃO DO MERCADO PAGO =========
    // 🔴 COLOQUE A SUA PUBLIC KEY AQUI (do Mercado Pago Developers)
    const PUBLIC_KEY = "SUA_PUBLIC_KEY_AQUI";
    
    // 🔴 COLOQUE A URL DO SEU BACKEND AQUI (ex: https://bloxstore-backend.vercel.app)
    const BACKEND_URL = "http://localhost:3000";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let usuarioAtual = null;
    let isDono = false;

    function atualizarHeaderAuth() {
        const authArea = document.getElementById('authArea');
        if (usuarioAtual) {
            authArea.innerHTML = `
                <div class="user-info-header">
                    👤 ${usuarioAtual.nome} ${isDono ? '👑' : ''}
                    <span class="logout-btn-header" onclick="window.logout()">Sair</span>
                </div>
            `;
        } else {
            authArea.innerHTML = `
                <button onclick="window.mostrarModalLogin()">Entrar</button>
                <button onclick="window.mostrarModalCadastro()">Criar Conta</button>
            `;
        }
    }

    window.mostrarModalLogin = function() {
        const modalHtml = `
            <div class="modal" id="loginModal">
                <div class="modal-content">
                    <h2>🔐 Entrar na Conta</h2>
                    <input type="text" id="loginNome" placeholder="Seu nome">
                    <input type="password" id="loginSenha" placeholder="Sua senha">
                    <button onclick="window.fazerLogin()">Entrar</button>
                    <button onclick="window.fecharModal()" class="btn-danger">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.mostrarModalCadastro = function() {
        const modalHtml = `
            <div class="modal" id="loginModal">
                <div class="modal-content">
                    <h2>📝 Criar Conta</h2>
                    <input type="text" id="cadastroNome" placeholder="Escolha um nome">
                    <input type="password" id="cadastroSenha" placeholder="Crie uma senha">
                    <button onclick="window.fazerCadastro()">Criar Conta</button>
                    <button onclick="window.fecharModal()" class="btn-danger">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.fecharModal = function() {
        const modal = document.getElementById('loginModal');
        if (modal) modal.remove();
    }

    window.fazerLogin = async function() {
        const nome = document.getElementById('loginNome').value.trim();
        const senha = document.getElementById('loginSenha').value;

        if (nome === "" && senha === "inject valeu") {
            usuarioAtual = { nome: "Dono_Master", tipo: "dono" };
            isDono = true;
            sessionStorage.setItem('usuario', JSON.stringify(usuarioAtual));
            window.fecharModal();
            atualizarHeaderAuth();
            mostrarProdutos();
            alert("🎩 Modo Dono ativado!");
            return;
        }

        if (!nome || !senha) {
            alert("Preencha nome e senha");
            return;
        }

        const q = query(collection(db, "SLK_aut"), where("nome", "==", nome), where("senha", "==", senha));
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
            alert("Nome ou senha incorretos!");
            return;
        }

        const userData = snapshot.docs[0].data();
        usuarioAtual = { nome: userData.nome, tipo: userData.tipo };
        isDono = userData.tipo === 'dono';
        sessionStorage.setItem('usuario', JSON.stringify(usuarioAtual));
        window.fecharModal();
        atualizarHeaderAuth();
        mostrarProdutos();
        alert(`Bem-vindo ${usuarioAtual.nome}!`);
    }

    window.fazerCadastro = async function() {
        const nome = document.getElementById('cadastroNome').value.trim();
        const senha = document.getElementById('cadastroSenha').value;

        if (!nome || !senha) {
            alert("Preencha nome e senha");
            return;
        }

        const existente = query(collection(db, "SLK_aut"), where("nome", "==", nome));
        const snapshot = await getDocs(existente);
        if (!snapshot.empty) {
            alert("Nome já cadastrado!");
            return;
        }

        await addDoc(collection(db, "SLK_aut"), {
            nome: nome,
            senha: senha,
            tipo: "normal"
        });

        alert("Conta criada! Faça login.");
        window.fecharModal();
        window.mostrarModalLogin();
    }

    window.logout = function() {
        sessionStorage.removeItem('usuario');
        usuarioAtual = null;
        isDono = false;
        atualizarHeaderAuth();
        mostrarProdutos();
        alert("Você saiu.");
    }

    function checkLogin() {
        const saved = sessionStorage.getItem('usuario');
        if (saved) {
            usuarioAtual = JSON.parse(saved);
            isDono = usuarioAtual.tipo === 'dono';
        }
        atualizarHeaderAuth();
        mostrarProdutos();
    }

    window.mostrarProdutos = async function() {
        let html = ``;

        if (usuarioAtual && isDono) {
            html += `<div class="painel-dono">
                        <h3>👑 Painel do Dono</h3>
                        <button onclick="window.mostrarTodosTickets()">📋 Ver TODOS os Tickets</button>
                        <button onclick="window.mostrarGerenciarProdutos()" class="btn-warning">➕ Gerenciar Produtos</button>
                     </div>`;
        }

        html += `<h2>🛒 Produtos Disponíveis</h2>`;

        const produtosSnapshot = await getDocs(collection(db, "produtos"));
        
        if (produtosSnapshot.empty) {
            html += `<p>Nenhum produto cadastrado.</p>`;
            if (isDono) {
                html += `<button onclick="window.mostrarGerenciarProdutos()" class="btn-warning">➕ Adicionar Produto</button>`;
            }
        } else {
            produtosSnapshot.forEach(doc => {
                const produto = doc.data();
                html += `
                    <div class="card">
                        <h3>${produto.nome}</h3>
                        <p>💰 R$ ${produto.preco} cada</p>
                        <input type="number" id="qtd-${doc.id}" class="quantidade-input" placeholder="Quantidade" value="1" min="1">
                        <button onclick="window.comprarProduto('${doc.id}', '${produto.nome}', '${produto.preco}')">Comprar agora</button>
                    </div>
                `;
            });
        }

        document.getElementById('mainContainer').innerHTML = html;
    }

    // ========= FUNÇÃO DE COMPRA COM MERCADO PAGO =========
    window.comprarProduto = async function(produtoId, nome, preco) {
        if (!usuarioAtual) {
            alert("⚠️ Faça login para comprar!");
            window.mostrarModalLogin();
            return;
        }
        
        if (usuarioAtual.tipo === 'dono') {
            alert("Modo dono não pode comprar.");
            return;
        }
        
        const quantidade = document.getElementById(`qtd-${produtoId}`)?.value || 1;
        const valorTotal = (parseFloat(preco) * parseInt(quantidade)).toFixed(2);
        
        // Mostrar loading
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "⏳ Gerando pagamento...";
        btn.disabled = true;
        
        try {
            // 1. Criar preferência no backend
            const response = await fetch(`${BACKEND_URL}/create-payment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: nome,
                    preco: parseFloat(preco),
                    quantidade: parseInt(quantidade),
                    email: usuarioAtual.email || `${usuarioAtual.nome}@cliente.com`
                })
            });
            
            const data = await response.json();
            
            if (!data.preferenceId) {
                throw new Error("Erro ao criar pagamento");
            }
            
            // 2. Criar ticket AGUARDANDO PAGAMENTO
            const ticketRef = await addDoc(collection(db, "tickets"), {
                nomeUsuario: usuarioAtual.nome,
                produto: nome,
                precoUnitario: preco,
                quantidade: parseInt(quantidade),
                valorTotal: valorTotal,
                status: "aguardando_pagamento",
                preferenceId: data.preferenceId,
                respondido: false,
                respostaDono: "",
                data: new Date().toISOString(),
                produtoId: produtoId
            });
            
            // 3. Abrir checkout do Mercado Pago
            const mp = new MercadoPago(PUBLIC_KEY);
            mp.checkout({
                preferenceId: data.preferenceId,
                redirectMode: 'blank'
            });
            
            alert(`🔐 Pagamento gerado!\n📦 Produto: ${nome}\n🔢 Quantidade: ${quantidade}\n💰 Total: R$ ${valorTotal}\n\nApós o pagamento, o ticket será liberado automaticamente.`);
            
        } catch (error) {
            console.error("Erro na compra:", error);
            alert("Erro ao gerar pagamento: " + error.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    window.mostrarMeusTickets = async function() {
        if (!usuarioAtual) {
            alert("Faça login para ver seus tickets!");
            window.mostrarModalLogin();
            return;
        }

        if (isDono) {
            window.mostrarTodosTickets();
            return;
        }

        const q = query(collection(db, "tickets"), where("nomeUsuario", "==", usuarioAtual.nome), orderBy("data", "desc"));
        const snapshot = await getDocs(q);
        
        let html = `<h2>🎫 Meus Tickets</h2>`;
        if (snapshot.empty) {
            html += `<p>Você não tem tickets. Compre um produto!</p>`;
        } else {
            snapshot.forEach(doc => {
                const ticket = doc.data();
                let statusText = "";
                let statusColor = "";
                
                if (ticket.status === 'aguardando_pagamento') {
                    statusText = "🟡 Aguardando pagamento";
                    statusColor = "f59e0b";
                } else if (ticket.status === 'pago') {
                    statusText = "🟢 Pagamento confirmado! Aguardando entrega";
                    statusColor = "22c55e";
                } else if (ticket.status === 'entregue') {
                    statusText = "✅ Entregue";
                    statusColor = "ef4444";
                } else {
                    statusText = "🟢 " + ticket.status;
                }
                
                let statusClass = 'ticket-item';
                if (ticket.status === 'entregue') statusClass += ' entregue';
                
                html += `
                    <div class="${statusClass}">
                        <strong>${ticket.produto}</strong><br>
                        Quantidade: ${ticket.quantidade || 1}<br>
                        Valor total: R$ ${ticket.valorTotal}<br>
                        Status: <span style="color: #${statusColor}">${statusText}</span><br>
                        Data: ${new Date(ticket.data).toLocaleString()}<br>
                        ${ticket.respostaDono ? `<div class="resposta-dono"><strong>📩 Resposta do Dono:</strong><br>${ticket.respostaDono}</div>` : ''}
                    </div>
                `;
            });
        }
        html += `<br><button onclick="window.mostrarProdutos()" class="voltar-btn">← Voltar para Loja</button>`;
        document.getElementById('mainContainer').innerHTML = html;
    }

    window.mostrarTodosTickets = async function() {
        if (!isDono) return;

        const snapshot = await getDocs(query(collection(db, "tickets"), orderBy("data", "desc")));
        
        let html = `<div class="painel-dono">
                        <h3>👑 Painel do Dono - Gerenciar Tickets</h3>
                        <button onclick="window.mostrarProdutos()" class="voltar-btn">← Voltar para Loja</button>
                        <button onclick="window.mostrarGerenciarProdutos()" class="btn-warning">📦 Gerenciar Produtos</button>
                    </div>
                    <h2>📋 TODOS OS TICKETS (${snapshot.size})</h2>`;

        if (snapshot.empty) {
            html += `<p>Nenhum ticket criado ainda.</p>`;
        } else {
            snapshot.forEach(doc => {
                const ticket = doc.data();
                let statusText = "";
                if (ticket.status === 'aguardando_pagamento') statusText = "🟡 AGUARDANDO PAGAMENTO";
                else if (ticket.status === 'pago') statusText = "🟢 PAGO - AGUARDAR ENTREGA";
                else if (ticket.status === 'entregue') statusText = "🔴 ENTREGUE";
                else statusText = "🟢 " + ticket.status;
                
                let statusClass = 'ticket-item';
                if (ticket.status === 'entregue') statusClass += ' entregue';
                
                html += `
                    <div class="${statusClass}" id="ticket-${doc.id}">
                        <strong>👤 Cliente:</strong> ${ticket.nomeUsuario}<br>
                        <strong>🛒 Produto:</strong> ${ticket.produto}<br>
                        <strong>🔢 Quantidade:</strong> ${ticket.quantidade || 1}<br>
                        <strong>💰 Valor:</strong> R$ ${ticket.valorTotal}<br>
                        <strong>📅 Data:</strong> ${new Date(ticket.data).toLocaleString()}<br>
                        <strong>📌 Status:</strong> ${statusText}<br>
                        ${ticket.respostaDono ? `<div class="resposta-dono"><strong>💬 Sua resposta:</strong><br>${ticket.respostaDono}</div>` : ''}
                        <div style="margin-top: 10px;">
                            ${ticket.status === 'pago' ? `<button class="finalizar-btn" onclick="window.finalizarTicket('${doc.id}')">✅ Marcar como Entregue</button>` : ''}
                            <button class="responder-btn" onclick="window.mostrarModalResponder('${doc.id}', '${ticket.nomeUsuario}', '${ticket.produto.replace(/'/g, "\\'")}')">💬 Responder Cliente</button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('mainContainer').innerHTML = html;
    }

    window.mostrarModalResponder = function(ticketId, clienteNome, produto) {
        const modalHtml = `
            <div class="modal" id="responderModal">
                <div class="modal-content">
                    <h2>💬 Responder Ticket</h2>
                    <p><strong>Cliente:</strong> ${clienteNome}</p>
                    <p><strong>Produto:</strong> ${produto}</p>
                    <textarea id="respostaTexto" rows="4" placeholder="Digite sua resposta para o cliente..."></textarea>
                    <button onclick="window.enviarResposta('${ticketId}')">Enviar Resposta</button>
                    <button onclick="window.fecharModalResponder()" class="btn-danger">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.fecharModalResponder = function() {
        const modal = document.getElementById('responderModal');
        if (modal) modal.remove();
    }

    window.enviarResposta = async function(ticketId) {
        const resposta = document.getElementById('respostaTexto').value.trim();
        if (!resposta) {
            alert("Digite uma resposta!");
            return;
        }

        await updateDoc(doc(db, "tickets", ticketId), {
            respostaDono: resposta,
            respondido: true
        });

        alert("Resposta enviada ao cliente!");
        window.fecharModalResponder();
        window.mostrarTodosTickets();
    }

    window.finalizarTicket = async function(ticketId) {
        if (!isDono) return;
        await updateDoc(doc(db, "tickets", ticketId), { 
            status: "entregue",
            dataEntrega: new Date().toISOString()
        });
        alert("✅ Ticket marcado como entregue!");
        window.mostrarTodosTickets();
    }

    window.mostrarGerenciarProdutos = async function() {
        if (!isDono) return;

        const snapshot = await getDocs(collection(db, "produtos"));
        
        let html = `<div class="painel-dono">
                        <h3>👑 Gerenciar Produtos</h3>
                        <button onclick="window.mostrarProdutos()" class="voltar-btn">← Voltar para Loja</button>
                        <button onclick="window.mostrarTodosTickets()">📋 Ver Tickets</button>
                    </div>
                    <button class="add-product-btn" onclick="window.mostrarModalAdicionarProduto()">➕ Adicionar Novo Produto</button>
                    <hr>
                    <h3>📦 Produtos Cadastrados</h3>`;

        if (snapshot.empty) {
            html += `<p>Nenhum produto cadastrado. Clique em "Adicionar Produto" para começar!</p>`;
        } else {
            snapshot.forEach(doc => {
                const produto = doc.data();
                html += `
                    <div class="product-item">
                        <strong>${produto.nome}</strong><br>
                        Preço: R$ ${produto.preco}<br>
                        <button class="edit-btn" onclick="window.mostrarModalEditarProduto('${doc.id}', '${produto.nome.replace(/'/g, "\\'")}', '${produto.preco}')">✏️ Editar</button>
                        <button class="delete-btn" onclick="window.deletarProduto('${doc.id}')">🗑️ Excluir</button>
                    </div>
                `;
            });
        }

        document.getElementById('mainContainer').innerHTML = html;
    }

    window.mostrarModalAdicionarProduto = function() {
        const modalHtml = `
            <div class="modal" id="produtoModal">
                <div class="modal-content">
                    <h2>➕ Adicionar Produto</h2>
                    <input type="text" id="prodNome" placeholder="Nome do produto">
                    <input type="number" id="prodPreco" placeholder="Preço (ex: 5.90)" step="0.01">
                    <button onclick="window.salvarProduto()">Salvar Produto</button>
                    <button onclick="window.fecharModalProduto()" class="btn-danger">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.mostrarModalEditarProduto = function(id, nome, preco) {
        const modalHtml = `
            <div class="modal" id="produtoModal">
                <div class="modal-content">
                    <h2>✏️ Editar Produto</h2>
                    <input type="text" id="prodNome" value="${nome}">
                    <input type="number" id="prodPreco" value="${preco}" step="0.01">
                    <button onclick="window.atualizarProduto('${id}')">Atualizar</button>
                    <button onclick="window.fecharModalProduto()" class="btn-danger">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.fecharModalProduto = function() {
        const modal = document.getElementById('produtoModal');
        if (modal) modal.remove();
    }

    window.salvarProduto = async function() {
        const nome = document.getElementById('prodNome').value.trim();
        const preco = document.getElementById('prodPreco').value;

        if (!nome || !preco) {
            alert("Preencha nome e preço!");
            return;
        }

        try {
            await addDoc(collection(db, "produtos"), { 
                nome, 
                preco
            });
            alert("✅ Produto adicionado com sucesso!");
            window.fecharModalProduto();
            window.mostrarGerenciarProdutos();
        } catch (error) {
            alert("Erro ao adicionar produto: " + error.message);
            console.error(error);
        }
    }

    window.atualizarProduto = async function(id) {
        const nome = document.getElementById('prodNome').value.trim();
        const preco = document.getElementById('prodPreco').value;

        if (!nome || !preco) {
            alert("Preencha nome e preço!");
            return;
        }

        try {
            await updateDoc(doc(db, "produtos", id), { 
                nome, 
                preco
            });
            alert("✅ Produto atualizado!");
            window.fecharModalProduto();
            window.mostrarGerenciarProdutos();
        } catch (error) {
            alert("Erro ao atualizar: " + error.message);
        }
    }

    window.deletarProduto = async function(id) {
        if (confirm("⚠️ Tem certeza que deseja excluir este produto?")) {
            try {
                await deleteDoc(doc(db, "produtos", id));
                alert("Produto excluído!");
                window.mostrarGerenciarProdutos();
            } catch (error) {
                alert("Erro ao excluir: " + error.message);
            }
        }
    }

    checkLogin();
</script>

</body>
</html>
